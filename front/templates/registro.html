{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}

<header class="reviews-header">
    <h1>Crear cuenta</h1>
    <p>Registrate como usuario de la taberna medieval.</p>
</header>

<section class="reviews-section">

    <div class="parchment-card">

        <h2>Registro</h2>

        <form method="POST" class="medieval-form" action = "/registro">

            <div class="form-group">
                <label for="email">Email</label>

                <input 
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Ingresá tu email"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="nombre">Nombre de usuario</label>

                <input 
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Elegí un nombre de usuario"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>

                <input 
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Ingresá tu contraseña"
                    required
                >
            </div>

            {% if error %}
            <div class="error-message">
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <button type="submit">
                Registrarme
            </button>

        </form>

        <p style="margin-top: 20px; text-align: center;">
            ¿Ya tenés cuenta?
            <a href="{{ url_for('login') }}">Iniciá sesión</a>
        </p>

    </div>

</section>

{% endblock %}
