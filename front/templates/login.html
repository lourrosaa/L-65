{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<header class="reviews-header">
    <h1>Iniciar Sesión</h1>
    <p>Ingresá a tu cuenta de la taberna medieval.</p>
</header>



<section class="reviews-section">

    <div class="parchment-card">

        <h2>Accedé a tu cuenta</h2>

        <form method="POST" class="medieval-form" action = "/login">
            
            <div class="form-group">
                <label for="email">Email</label>

                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Ingresá tu email"
                    required 
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>

                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresá tu contraseña"
                    required
                >
            </div>

            {% if error %}
            <div class="error-message">
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <button type="submit">
                Iniciar sesión
            </button>

        </form>

        <p class="search-card__subtitle" style="margin-top: 1rem; text-align: center;">
            ¿No tenés cuenta? <a href="{{ url_for('registro') }}" class="link">Registrate</a>
        </p>

    </div>

</section>

{% endblock %}
