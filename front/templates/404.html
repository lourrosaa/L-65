{% extends "base.html" %}

{% block title %}404 - Pagina perdida{% endblock %}

{% block content %}

<div class="error-page">
    <h1 class="error-page_code">404</h1>
    <h2 class="error-page__title">Pagina no encontrada</h2>
    <p class="error-page_message">
        La pagina que buscas en este reino no existe <br>
        Puede seguir investigando nuestra taberna a continuacion...
    </p>

    <a href="{{ url_for('index') }}" class="boton">Volver a la taberna</a>
</div>
{% endblock %}
